# Cloudflare Workers — Vite static build in ./dist
# `dist/` is gitignored; Wrangler runs [build] before upload so deploy always has assets.
# CI example: npm ci && npx wrangler deploy
# https://developers.cloudflare.com/workers/static-assets/

name = "genom"
compatibility_date = "2024-12-01"

[build]
command = "npm run build"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
